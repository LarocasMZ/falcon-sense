<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Red Glow Gradient -->
    <linearGradient id="redGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff3333;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cc2929;stop-opacity:1" />
    </linearGradient>
    
    <!-- Falcon Body Gradient -->
    <linearGradient id="falconDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a2a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:1" />
    </linearGradient>
    
    <!-- Falcon Light Gradient -->
    <linearGradient id="falconLight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e8e8e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow Filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="60" cy="60" r="58" fill="#0a0a0a" stroke="#2a2a2a" stroke-width="2"/>
  
  <!-- Circuit lines (red glow) -->
  <g stroke="url(#redGlow)" stroke-width="2" fill="none" filter="url(#glow)" opacity="0.9">
    <path d="M 25 35 L 35 35 L 40 33"/>
    <path d="M 23 42 L 37 42 L 43 40"/>
    <path d="M 27 49 L 39 49 L 45 47"/>
    <!-- Circuit dots -->
    <circle cx="35" cy="35" r="2" fill="#ff3333"/>
    <circle cx="37" cy="42" r="2" fill="#ff3333"/>
    <circle cx="39" cy="49" r="2" fill="#ff3333"/>
    <circle cx="40" cy="33" r="1.5" fill="#ff3333"/>
    <circle cx="43" cy="40" r="1.5" fill="#ff3333"/>
    <circle cx="45" cy="47" r="1.5" fill="#ff3333"/>
  </g>
  
  <!-- Main head shape -->
  <path d="M 35 25 Q 45 20 55 25 Q 65 30 68 40 Q 72 50 67 60 Q 62 68 52 70 Q 42 68 38 58" 
        fill="url(#falconDark)" stroke="#4a4a4a" stroke-width="1"/>
  
  <!-- White chest/neck -->
  <path d="M 42 52 Q 48 58 54 62 Q 60 65 62 70 Q 58 74 52 74 Q 44 72 38 65 Q 34 58 37 52" 
        fill="url(#falconLight)"/>
  
  <!-- Beak -->
  <path d="M 66 40 L 78 45 L 68 50 Z" fill="#5a6a7a" stroke="#3a4a5a" stroke-width="0.5"/>
  
  <!-- Red glowing eye -->
  <circle cx="54" cy="35" r="5" fill="#ff3333" filter="url(#glow)"/>
  <circle cx="54" cy="35" r="2.5" fill="#ffffff"/>
  <circle cx="55" cy="34" r="1" fill="#ffffff"/>
  
  <!-- Eye glow ring -->
  <circle cx="54" cy="35" r="7" fill="none" stroke="#ff3333" stroke-width="1" opacity="0.5"/>
  
  <!-- Wing/chest circuit pattern -->
  <g stroke="url(#redGlow)" stroke-width="1.5" fill="none" opacity="0.8">
    <path d="M 45 58 L 50 64 L 54 62"/>
    <path d="M 42 64 L 48 70 L 52 68"/>
    <circle cx="50" cy="64" r="1.5" fill="#ff3333"/>
    <circle cx="48" cy="70" r="1.5" fill="#ff3333"/>
    <circle cx="54" cy="62" r="1.5" fill="#ff3333"/>
  </g>
  
  <!-- Outer ring glow -->
  <circle cx="60" cy="60" r="56" fill="none" stroke="#ff3333" stroke-width="0.5" opacity="0.3"/>
</svg>
